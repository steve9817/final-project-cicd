name: Build image and create Trivy CSV report

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-scan-main
  cancel-in-progress: true

jobs:
  build-push-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=chamara98/vuln-python-app:latest" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Run Trivy and create CSV report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          template: "./csv.tpl"
          output: "trivy-critical.csv"
          severity: "CRITICAL,HIGH"
          vuln-type: "os,library"
          scanner: "vuln"
          exit-code: "0"

      - name: Upload CSV report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-critical-report
          path: trivy-critical.csv